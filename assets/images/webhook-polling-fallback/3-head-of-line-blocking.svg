<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 196" width="720" height="196" role="img" aria-label="Sem retry topics, a proposta que falha não confirma o offset e trava a partição inteira, segurando todas as mensagens atrás dela.">
<defs>
<style>
text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;}
.ttl{font-size:14.5px;font-weight:600;} .sub{font-size:12px;} .lbl{font-size:12px;} .hd{font-size:13.5px;font-weight:600;}
.t-neu{fill:#2c2c2a;} .t-warn{fill:#854f0b;} .t-lbl{fill:#5f5e5a;}
.b-neu{fill:#eef0f2;stroke:#c4c8cc;} .b-warn{fill:#faeeda;stroke:#ef9f27;}
rect{stroke-width:1;}
.bad{stroke:#d06a44;stroke-width:1.5;fill:none;} .ahb{fill:#d06a44;}
@media(prefers-color-scheme:dark){
.t-neu{fill:#d3d1c7;} .t-warn{fill:#fac775;} .t-lbl{fill:#b4b2a9;}
.b-neu{fill:#33332f;stroke:#5f5e5a;} .b-warn{fill:#3d2a08;stroke:#ba7517;}
.bad{stroke:#cf6a43;} .ahb{fill:#cf6a43;}
}
</style>
<marker id="ahb" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" class="ahb"/></marker>
</defs>

<text class="hd t-neu" x="60" y="34" text-anchor="start">Partição — sem retry topics (o jeito errado)</text>

<rect class="b-warn" x="60" y="50" width="120" height="54" rx="8"/>
<text class="ttl t-warn" x="120" y="74" text-anchor="middle">#1</text>
<text class="sub t-warn" x="120" y="91" text-anchor="middle">TRAVADA</text>
<rect class="b-neu" x="190" y="50" width="110" height="54" rx="8"/>
<text class="ttl t-neu" x="245" y="83" text-anchor="middle">#2</text>
<rect class="b-neu" x="312" y="50" width="110" height="54" rx="8"/>
<text class="ttl t-neu" x="367" y="83" text-anchor="middle">#3</text>
<rect class="b-neu" x="434" y="50" width="110" height="54" rx="8"/>
<text class="ttl t-neu" x="489" y="83" text-anchor="middle">#4</text>
<rect class="b-neu" x="556" y="50" width="110" height="54" rx="8"/>
<text class="ttl t-neu" x="611" y="83" text-anchor="middle">#5 …</text>

<text class="lbl t-lbl" x="433" y="128" text-anchor="middle">↑ todas presas atrás da #1</text>
<path class="bad" d="M120,108 L120,140" marker-end="url(#ahb)"/>
<text class="lbl t-lbl" x="60" y="160" text-anchor="start">A #1 falhou e o consumidor não confirma o offset para tentar depois —</text>
<text class="lbl t-lbl" x="60" y="178" text-anchor="start">ela segura todas as mensagens atrás dela na mesma partição.</text>
</svg>
